<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <title>사주 보기</title>
  <meta property="og:title" content="사주 보기" />
  <meta property="og:description" content="랜덤 이미지로 미래 사주를 확인해보세요." />
  <meta property="og:type" content="website" />
  <meta name="twitter:title" content="사주 보기" />
  <meta name="twitter:description" content="랜덤 이미지로 미래 사주를 확인해보세요." />
  <style>
    :root {
      --grid-line: #edf0f3;
      --orange: #ff6b00;
      --navy: #061633;
      --muted: #667085;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background-color: #fff;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 12px 12px;
      color: var(--navy);
      font-family: Arial, "Malgun Gothic", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    .play-panel {
      width: min(800px, 100%);
      min-height: 520px;
      border: 0;
      border-radius: 15px;
      background: #ffffff;
      box-shadow:
        0 0 34px rgba(6, 22, 51, .18),
        0 18px 60px rgba(6, 22, 51, .12);
      padding: 30px;
    }

    .saju-step {
      display: grid;
      gap: 22px;
      justify-items: center;
    }

    .saju-step[hidden] {
      display: none;
    }

    .saju-title {
      margin: 0;
      color: var(--navy);
      font-size: 34px;
      font-weight: 800;
      text-align: center;
      line-height: 1.2;
    }

    .saju-form {
      display: grid;
      gap: 14px;
      width: min(460px, 100%);
    }

    .saju-field {
      display: grid;
      gap: 7px;
      color: var(--navy);
      font-size: 15px;
      font-weight: 700;
    }

    .saju-field input {
      width: 100%;
      min-height: 48px;
      border: 2px solid #d8dee8;
      border-radius: 9px;
      padding: 10px 13px;
      color: var(--navy);
      background: #fff;
      outline: none;
    }

    .saju-field input:focus {
      border-color: var(--orange);
    }

    .saju-primary-button,
    .saju-secondary-button {
      min-height: 50px;
      border: 0;
      border-radius: 999px;
      padding: 12px 26px;
      color: #fff;
      background: var(--orange);
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .saju-secondary-button {
      background: var(--navy);
    }

    .saju-loading-video {
      width: min(520px, 100%);
      border-radius: 15px;
      background: #f5f7fb;
      box-shadow: 0 10px 24px rgba(6, 22, 51, .14);
      object-fit: cover;
    }

    .saju-result-list {
      display: grid;
      gap: 12px;
      width: 100%;
    }

    .saju-result-card {
      display: grid;
      grid-template-columns: minmax(140px, .7fr) 92px minmax(0, 1fr);
      align-items: center;
      gap: 16px;
      min-height: 116px;
      padding: 12px 18px;
      border: 1px solid #d8dee8;
      border-radius: 12px;
      background: #fff;
    }

    .saju-result-label {
      color: var(--navy);
      font-size: 17px;
      font-weight: 800;
      text-align: right;
    }

    .saju-partner-image {
      width: 86px;
      height: 86px;
      border: 1px solid #d8dee8;
      border-radius: 12px;
      object-fit: cover;
      background: #f5f7fb;
    }

    .saju-partner-name {
      color: var(--navy);
      font-size: 23px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .saju-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .copy-toast {
      position: fixed;
      left: 50%;
      bottom: 34px;
      z-index: 50;
      transform: translate(-50%, 10px);
      padding: 14px 24px;
      color: #fff;
      background: rgba(6, 22, 51, .92);
      border-radius: 999px;
      box-shadow: 0 10px 24px rgba(6, 22, 51, .22);
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
      opacity: 0;
      pointer-events: none;
      transition: opacity .16s ease, transform .16s ease;
    }

    .copy-toast.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .play-panel {
        padding: 22px 16px;
      }

      .saju-title {
        font-size: 26px;
      }

      .saju-result-card {
        grid-template-columns: 78px minmax(0, 1fr);
        gap: 12px;
      }

      .saju-result-label {
        grid-column: 1 / -1;
        text-align: left;
      }

      .saju-partner-image {
        width: 78px;
        height: 78px;
      }
    }
  </style>
</head>
<body>
  <main class="play-panel" aria-label="플레이 영역">
    <section class="saju-step is-active" data-saju-step="form" aria-label="사주 입력">
      <h1 class="saju-title">똥꼬의 미래 사주 보기!</h1>
      <form id="sajuForm" class="saju-form">
        <label class="saju-field">
          <span>이름</span>
          <input id="sajuName" type="text" placeholder="이름을 입력하세요" autocomplete="name" />
        </label>
        <label class="saju-field">
          <span>아직도 엘냐를 믿나요?</span>
          <input id="sajuInsight" type="text" placeholder="y/n" />
        </label>
        <label class="saju-field">
          <span>로또 번호를 적어주세요.</span>
          <input id="sajuAffiliation" type="text" placeholder="이거 빼고 사셈" />
        </label>
        <button class="saju-primary-button" type="submit">사주 보기</button>
      </form>
    </section>

    <section class="saju-step" data-saju-step="loading" aria-label="사주 계산 중" hidden>
      <video id="sajuLoadingVideo" class="saju-loading-video" src="playingimage/Loading.mp4" muted playsinline preload="auto"></video>
    </section>

    <section class="saju-step" data-saju-step="result" aria-label="사주 결과" hidden>
      <h1 id="sajuResultTitle" class="saju-title">미래 결과</h1>
      <div id="sajuResultList" class="saju-result-list"></div>
      <div class="saju-actions">
        <button id="sajuCopyButton" class="saju-secondary-button" type="button">이미지 복사</button>
        <button id="sajuRetryButton" class="saju-primary-button" type="button">다시 하기</button>
      </div>
    </section>
  </main>

  <div id="copyToast" class="copy-toast" role="status" aria-live="polite" hidden>복사 완료</div>

  <script>
    const sajuForm = document.getElementById("sajuForm");
    const sajuNameInput = document.getElementById("sajuName");
    const sajuResultTitle = document.getElementById("sajuResultTitle");
    const sajuResultList = document.getElementById("sajuResultList");
    const sajuRetryButton = document.getElementById("sajuRetryButton");
    const sajuCopyButton = document.getElementById("sajuCopyButton");
    const sajuLoadingVideo = document.getElementById("sajuLoadingVideo");
    const copyToast = document.getElementById("copyToast");
    const sajuResultLabels = [
      "미래 연인",
      "미래 배우자",
      "운명의 라이벌",
      "인생 멘토",
      "인생 동료",
      "롤모델",
      "반면교사",
      "사업 파트너",
      "상사",
      "부하",
      "자식의 직업",
      "전생",
      "이세계 환생",
      "페티쉬",
      "나를 좋아하는 사람",
      "싸울 상대",
      "덕질 대상",
      "침대 밑에 있는 것",
      "조상님",
      "새 인생을 산다면"
    ];
    const fallbackPartners = [
      { name: "AI 비서", image: "playingimage/AI 비서.png" },
      { name: "해커", image: "playingimage/해커.png" },
      { name: "현자", image: "playingimage/현자.png" }
    ];
    const sajuState = {
      name: "",
      results: [],
      timer: null
    };

    sajuForm.addEventListener("submit", startSajuReading);
    sajuRetryButton.addEventListener("click", resetSajuReading);
    sajuCopyButton.addEventListener("click", copySajuResult);

    function startSajuReading(event) {
      event.preventDefault();
      const fields = Array.from(sajuForm.querySelectorAll("input"));
      if (fields.some((field) => !field.value.trim())) {
        showCopyToast("빈 칸을 채워주세요");
        return;
      }

      sajuState.name = sajuNameInput.value.trim();
      setSajuStep("loading");
      sajuLoadingVideo.currentTime = 0;
      window.clearTimeout(sajuState.timer);
      sajuState.timer = window.setTimeout(showSajuResult, 4000);
      sajuLoadingVideo.play().catch(() => {});
    }

    async function showSajuResult() {
      window.clearTimeout(sajuState.timer);
      sajuLoadingVideo.pause();
      const results = await pickSajuResults();
      sajuState.results = results;
      sajuResultTitle.textContent = `${sajuState.name}의 미래`;
      sajuResultList.innerHTML = results.map((result) => `
        <div class="saju-result-card">
          <span class="saju-result-label">${escapeHtml(result.label)} :</span>
          <img class="saju-partner-image" src="${escapeAttr(result.person.image)}" alt="${escapeAttr(result.person.name)}" />
          <strong class="saju-partner-name">${escapeHtml(result.person.name)}</strong>
        </div>
      `).join("");
      setSajuStep("result");
    }

    function resetSajuReading() {
      window.clearTimeout(sajuState.timer);
      sajuLoadingVideo.pause();
      sajuLoadingVideo.currentTime = 0;
      sajuState.results = [];
      setSajuStep("form");
    }

    function setSajuStep(step) {
      document.querySelectorAll("[data-saju-step]").forEach((panel) => {
        const active = panel.dataset.sajuStep === step;
        panel.hidden = !active;
        panel.classList.toggle("is-active", active);
      });
    }

    async function pickSajuResults() {
      const partners = await loadSajuPartners();
      const shuffled = shuffle(partners);
      return sajuResultLabels.map((label, index) => ({
        label,
        person: shuffled[index % shuffled.length]
      }));
    }

    async function loadSajuPartners() {
      try {
        const response = await fetch(`playingimage/images.json?v=${Date.now()}`, { cache: "no-store" });
        const data = await response.json();
        const unique = new Map();
        (Array.isArray(data) ? data : []).forEach((item) => {
          const image = String(item.image || "");
          const name = String(item.name || "").trim() || fileNameFromPath(image);
          if (!name || !image.startsWith("playingimage/")) return;
          unique.set(image, { name, image });
        });
        if (unique.size) return Array.from(unique.values());
      } catch (error) {
        console.warn(error);
      }
      return fallbackPartners;
    }

    function shuffle(items) {
      const array = items.slice();
      for (let index = array.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [array[index], array[swapIndex]] = [array[swapIndex], array[index]];
      }
      return array;
    }

    async function copySajuResult() {
      if (!sajuState.results.length) return;
      sajuCopyButton.disabled = true;
      try {
        const blob = await createSajuResultImage();
        await copyImageBlob(blob);
        showCopyToast("이미지 복사 완료");
      } catch (error) {
        try {
          const blob = await createSajuResultImage();
          downloadBlob(blob, "saju-result.png");
          showCopyToast("이미지 다운로드 완료");
        } catch (downloadError) {
          showCopyToast("이미지 복사를 지원하지 않습니다");
        }
      } finally {
        sajuCopyButton.disabled = false;
      }
    }

    async function createSajuResultImage() {
      if (document.fonts?.ready) await document.fonts.ready;
      const scale = 2;
      const width = 980;
      const rowHeight = 118;
      const topPadding = 92;
      const bottomPadding = 46;
      const height = topPadding + sajuState.results.length * rowHeight + bottomPadding;
      const canvas = document.createElement("canvas");
      canvas.width = width * scale;
      canvas.height = height * scale;
      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#061633";
      ctx.font = '800 36px Arial, "Malgun Gothic", sans-serif';
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(sajuResultTitle.textContent, width / 2, 44);

      for (const [index, result] of sajuState.results.entries()) {
        const y = topPadding + index * rowHeight;
        drawRoundRect(ctx, 42, y + 8, width - 84, rowHeight - 16, 14, "#ffffff", "#d8dee8");

        ctx.fillStyle = "#061633";
        ctx.font = '800 20px Arial, "Malgun Gothic", sans-serif';
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";
        ctx.fillText(`${result.label} :`, 284, y + rowHeight / 2);

        await drawImageBox(ctx, result.person.image, 318, y + 16, 86, 86);

        ctx.fillStyle = "#061633";
        ctx.font = '800 25px Arial, "Malgun Gothic", sans-serif';
        ctx.textAlign = "left";
        drawFittedText(ctx, result.person.name, 430, y + rowHeight / 2, width - 472, 25);
      }

      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error("이미지를 생성하지 못했습니다"));
        }, "image/png");
      });
    }

    function drawRoundRect(ctx, x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      if (fill) {
        ctx.fillStyle = fill;
        ctx.fill();
      }
      if (stroke) {
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    async function drawImageBox(ctx, src, x, y, w, h) {
      ctx.save();
      drawRoundRect(ctx, x, y, w, h, 12, "#f5f7fb", null);
      ctx.clip();
      const image = await loadImage(src).catch(() => null);
      if (image) {
        const ratio = Math.max(w / image.naturalWidth, h / image.naturalHeight);
        const drawW = image.naturalWidth * ratio;
        const drawH = image.naturalHeight * ratio;
        ctx.drawImage(image, x + (w - drawW) / 2, y + (h - drawH) / 2, drawW, drawH);
      }
      ctx.restore();
      drawRoundRect(ctx, x, y, w, h, 12, null, "#d8dee8");
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = src;
      });
    }

    function drawFittedText(ctx, text, x, y, maxWidth, fontSize) {
      let size = fontSize;
      while (size > 14 && ctx.measureText(text).width > maxWidth) {
        size -= 1;
        ctx.font = `800 ${size}px Arial, "Malgun Gothic", sans-serif`;
      }
      ctx.fillText(text, x, y);
    }

    async function copyImageBlob(blob) {
      if (!navigator.clipboard || !window.ClipboardItem) throw new Error("이미지 클립보드를 지원하지 않습니다");
      await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
    }

    function downloadBlob(blob, filename) {
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      document.body.append(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(link.href), 1000);
    }

    function showCopyToast(message) {
      copyToast.textContent = message;
      copyToast.hidden = false;
      copyToast.classList.add("is-visible");
      clearTimeout(showCopyToast.timer);
      showCopyToast.timer = setTimeout(() => {
        copyToast.classList.remove("is-visible");
        copyToast.hidden = true;
      }, 1400);
    }

    function fileNameFromPath(path) {
      return decodeURIComponent(String(path).split("/").pop()?.replace(/\.[^.]+$/, "") || "");
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"]/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;" }[char]));
    }

    function escapeAttr(value) {
      return String(value ?? "").replace(/["'\\]/g, "");
    }
  </script>
</body>
</html>
